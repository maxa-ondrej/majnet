# Proxies to the WG-internal APIs (bot :8081, reconciler :9090 on the main
# node's WireGuard IP). Adjust 10.88.0.1 if nodes.yaml changes.
#
# Identity/trust: this MUST only be reachable through `tailscale serve`, which
# sets Tailscale-User-Login itself, or the Caddy edge, which strips any
# client-supplied value and injects a resolved one. The backends role-check that
# header (common/src/authz.rs); exposing this vhost any other way would let
# callers spoof identity.

# Terminal-WebSocket identity: prefer an edge-injected Tailscale-User-Login
# (tailscale serve sets it, including on WS upgrades); when it's absent (the
# Caddy edge can't inject it on WS upgrades) fall back to the value the bot's
# /tsauth resolved for us. Evaluated lazily at proxy time — after auth_request
# has run — so $ts_resolved is populated (a plain `if`/`set` would run in the
# earlier rewrite phase, before auth_request, and capture an empty value).
map $http_tailscale_user_login $ts_login {
    ""      $ts_resolved;
    default $http_tailscale_user_login;
}

server {
    # Host-networked (see compose.yaml): bind localhost-only so we don't clash
    # with Caddy on :80/:443. `tailscale serve --bg --http 80 http://127.0.0.1:8090`
    # fronts this and injects the trusted Tailscale-User-Login header.
    listen 127.0.0.1:8090;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/bot/ {
        proxy_pass http://10.88.0.1:8081/;
        proxy_set_header Tailscale-User-Login $http_tailscale_user_login;
    }

    # Interactive terminal (ADR 0016): a WebSocket to the reconciler. Needs the
    # HTTP/1.1 upgrade dance and a long read timeout so idle sessions stay open.
    # Match before the generic /api/recon/ block. The reconciler requires a
    # *named* admin, so identity must reach it.
    #
    # Two front doors inject identity differently: `tailscale serve`
    # (http://majksa) sets Tailscale-User-Login directly, including on WebSocket
    # upgrades; Caddy (dash.majksa.net) uses forward_auth, which does NOT inject
    # it on WebSocket upgrades. So when the header is absent we resolve it here
    # ourselves via the bot's /tsauth (the bot owns the Tailscale credential),
    # keyed on the caller's forwarded tailnet IP. Prefer an already-injected
    # header so the tailscale-serve path is unchanged.
    location /api/recon/api/terminal {
        auth_request /_tsauth;
        auth_request_set $ts_resolved $upstream_http_tailscale_user_login;

        proxy_pass http://10.88.0.1:9090/api/terminal;
        proxy_set_header Tailscale-User-Login $ts_login;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Internal identity resolver for the terminal WebSocket: the bot's /tsauth
    # maps the caller's tailnet IP → Tailscale login. Always 200 (identity
    # enrichment, never a gate — the reconciler is the real gate). Reachable on
    # localhost because the dashboard is host-networked (see compose.yaml).
    location = /_tsauth {
        internal;
        proxy_pass http://127.0.0.1:8080/tsauth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    location /api/recon/ {
        proxy_pass http://10.88.0.1:9090/;
        proxy_set_header Tailscale-User-Login $http_tailscale_user_login;
    }

    # Setup service (ADR 0004): WG-internal node enrollment stays available for
    # the platform's lifetime. Node onboarding from the dashboard posts here.
    # Enrollment SSHes into the target and runs bootstrap — allow a long read.
    location /api/setup/ {
        proxy_pass http://10.88.0.1:7601/;
        proxy_set_header Tailscale-User-Login $http_tailscale_user_login;
        proxy_read_timeout 600s;
    }
}
