# Managed DB engines (§15) — one copy per data zone: run on the prod node
# for production data and on the private node for dev data. No published
# ports: engines are reachable only via the project networks the reconciler
# attaches them to. Container names are the contract (`reconciler/src/db.rs`).
#
# The reconciler owns the deploy: `platform::ensure_engine` creates each
# engine over the Docker API on first use by an app that declares it (so a
# node only runs the engines it needs), seeding the root-secret file from the
# DB master key. This compose is the equivalent break-glass / documentation
# form — the container specs here and in ensure_engine must stay in sync.
services:
  postgres:
    image: postgres:17
    container_name: majnet-postgres
    restart: unless-stopped
    environment:
      # Superuser access stays inside the container (peer auth via exec);
      # per-app users are provisioned by the reconciler.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-root
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /etc/majnet/db-root/postgres:/run/secrets/postgres-root:ro

  mariadb:
    image: mariadb:11
    container_name: majnet-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb-root
    volumes:
      - mariadb-data:/var/lib/mysql
      - /etc/majnet/db-root/mariadb:/run/secrets/mariadb-root:ro

  valkey:
    image: valkey/valkey:8
    container_name: majnet-valkey
    restart: unless-stopped
    # aclfile persists reconciler-provisioned users across restarts. The
    # default user's password must live IN the acl file (requirepass is
    # silently ignored once --aclfile is set) — seeded on first boot only;
    # after that, ACL SAVE owns the file.
    command: >-
      sh -c 'test -s /data/users.acl
      || printf "user default on >%s ~* &* +@all\n" "$$(cat /run/secrets/valkey-root)" > /data/users.acl;
      exec docker-entrypoint.sh valkey-server --aclfile /data/users.acl'
    volumes:
      - valkey-data:/data
      - /etc/majnet/db-root/valkey:/run/secrets/valkey-root:ro

  mongodb:
    image: mongo:8
    container_name: majnet-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongodb-root
    volumes:
      - mongodb-data:/data/db
      - /etc/majnet/db-root/mongodb:/run/secrets/mongodb-root:ro

volumes:
  postgres-data:
  mariadb-data:
  valkey-data:
  mongodb-data:
