name: images

# Build the control-plane + dashboard images in CI and push them to GHCR,
# pinned by digest (ADR 0005, amended). This replaces on-box `cargo build`:
# the node pulls these images instead of compiling on a 2 GB VPS.

on:
  push:
    branches: [main]
    tags: ['v*']
    # Only rebuild when something that lands IN an image changes — not docs or
    # bootstrap scripts (those ship via the git ref, not the images).
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'dashboard/**'
      - '.github/workflows/images.yaml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: control-plane
            context: .
            file: Dockerfile
          - name: dashboard
            context: dashboard
            file: dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
